<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #004494;
        }
        .error {
            color: #d9534f;
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
            display: none; 
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acceso</h2>
        
        <p class="error" id="mensaje-error">Usuario o contraseña incorrectos</p>
        
        <form id="loginForm" onsubmit="iniciarSesion(event)">
            <label>Usuario</label>
            <input type="text" id="username" required>
            
            <label>Contraseña</label>
            <input type="password" id="password" required>
            
            <button type="submit">Ingresar</button>
        </form>
    </div>

    <script>
        async function iniciarSesion(event) {
            
            event.preventDefault(); 

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msjError = document.getElementById('mensaje-error');

            try {
                
                const respuesta = await fetch('https://proyecto-flask-2-bdp6.onrender.com/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await respuesta.json();

                if (data.success) {
                    
                    localStorage.setItem('nombreUsuario', data.nombre);
                    
                    window.location.href = 'principal.html';
                } else {
                    
                    msjError.style.display = 'block';
                }
            } catch (error) {
                console.error("Error en la petición:", error);
                msjError.textContent = "Error al conectar con el servidor.";
                msjError.style.display = 'block';
            }
        }
    </script>
</body>
</html>
