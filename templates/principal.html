<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Principal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        a.btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-primary {
            background-color: #0056b3;
        }
        .btn-primary:hover {
            background-color: #004494;
        }
        .btn-danger {
            background-color: #d9534f;
        }
        .btn-danger:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Panel Principal</h2>
        
        <p>Bienvenido, <strong id="nombre-usuario">...</strong></p>
        
        <a href="buscador.html" class="btn btn-primary">Buscar Producto</a>
        
        <a href="#" onclick="cerrarSesion(event)" class="btn btn-danger">Salir del Sistema</a>
    </div>

    <script>
        // Al cargar la página, recuperar el nombre guardado en el Login
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            
            if (nombre) {
                document.getElementById('nombre-usuario').innerText = nombre;
            } else {
                // Si alguien intenta entrar aquí sin iniciar sesión, lo regresamos al login
                window.location.href = 'login.html';
            }
        });

        // Función para cerrar sesión
        async function cerrarSesion(event) {
            event.preventDefault(); // Evita que el enlace salte a la parte superior de la página
            
            try {
                // Hacemos la petición a tu API en Render para limpiar la sesión en el servidor
                await fetch('https://proyecto-flask-2-bdp6.onrender.com/logout', {
                    method: 'POST'
                });
            } catch (error) {
                console.error("Error al conectar con el servidor:", error);
            }
            
            // Limpiamos los datos del navegador y redirigimos al login
            localStorage.removeItem('nombreUsuario');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
