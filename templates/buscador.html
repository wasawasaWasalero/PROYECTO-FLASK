<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Productos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }
        .container {
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 350px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { color: #333; margin-top: 0; text-align: center; }
        input {
            width: 70%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 25%;
            padding: 9px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #004494; }
        .nav-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }
        .nav-buttons a {
            text-decoration: none;
            padding: 8px 12px;
            color: white;
            background-color: #6c757d;
            border-radius: 4px;
            font-size: 14px;
        }
        .nav-buttons a.logout { background-color: #d9534f; }
        #resultado {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ccc;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .error { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Buscar Producto</h2>
        <div>
            <input type="text" id="codigo" placeholder="Ej: P001" onkeypress="if(event.key==='Enter') buscar()">
            <button onclick="buscar()">Buscar</button>
        </div>

        <div id="resultado"></div>

        <div class="nav-buttons">
            <a href="principal.html">Regresar</a>
            <a href="#" onclick="cerrarSesion(event)" class="logout">Salir</a>
        </div>
    </div>

    <script>
    // Validar que el usuario haya iniciado sesión
    document.addEventListener('DOMContentLoaded', () => {
        if (!localStorage.getItem('nombreUsuario')) {
            window.location.href = 'login.html';
        }
    });

    async function buscar() {
        const codigo = document.getElementById('codigo').value.trim();
        if (!codigo) { alert('Ingrese un código de producto'); return; }

        // Asegúrate de que esta URL es la correcta de tu Render
        const res  = await fetch('https://proyecto-flask-yzx4.onrender.com/api/buscar_producto', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codigo })
        });
        const data = await res.json();
        const div  = document.getElementById('resultado');
        div.style.display = 'block';

        if (data.encontrado) {
            div.innerHTML = `
                <p><strong>Nombre:</strong> ${data.nombre}</p>
                <p><strong>Código:</strong> ${data.codigo}</p>
                <p><strong>Descripción:</strong> ${data.descripcion}</p>
                <p><strong>Categoría:</strong> ${data.categoria}</p>
                <p><strong>Stock:</strong> ${data.stock} unidades</p>
                <p><strong>Precio:</strong> S/ ${data.precio.toFixed(2)}</p>
            `;
        } else {
            div.innerHTML = `<p class="error">Producto no encontrado.</p>`;
        }
    }

    // Función para cerrar sesión
    async function cerrarSesion(event) {
        event.preventDefault();
        try {
            await fetch('https://proyecto-flask-yzx4.onrender.com/logout', { method: 'POST' });
        } catch (error) {
            console.error("Error al conectar con el servidor:", error);
        }
        localStorage.removeItem('nombreUsuario');
        window.location.href = 'login.html';
    }
    </script>
</body>
</html>
